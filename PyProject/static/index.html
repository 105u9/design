<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVAC 智能控制云平台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-purple: #b53cff;
            --neon-green: #39ff14;
            --danger: #ff003c;
            --bg-color: #050814;
            --card-bg: rgba(15, 20, 40, 0.6);
            --card-border: rgba(0, 240, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --glass-blur: blur(16px);
        }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(181, 60, 255, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.1), transparent 25%);
            background-attachment: fixed;
            color: var(--text-primary);
            margin: 0; 
            padding: 20px 40px; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphism Classes */
        .glass {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Header */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 35px; 
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }
        
        /* Subtle glow line for header */
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-purple), transparent);
            opacity: 0.7;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ffffff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            display: flex;
            align-items: bottom;
            gap: 15px;
        }
        .header-subtext {
            font-family: 'Inter', sans-serif;
            font-size: 1rem; 
            font-weight: 400; 
            color: var(--text-secondary);
            -webkit-text-fill-color: initial;
            text-shadow: none;
            letter-spacing: 0;
            align-self: flex-end;
            margin-bottom: 5px;
        }

        /* Layout Grid */
        .dashboard { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 25px; 
            padding-bottom: 20px;
        }
        
        .c-span-4 { grid-column: span 4; }
        .c-span-8 { grid-column: span 8; }
        .c-span-6 { grid-column: span 6; }
        .c-span-12 { grid-column: span 12; }

        @media (max-width: 1200px) {
            .c-span-4 { grid-column: span 6; }
            .c-span-8 { grid-column: span 12; }
            .c-span-6 { grid-column: span 12; }
        }

        .card { 
            padding: 22px; 
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(181, 60, 255, 0.4);
            box-shadow: 0 10px 40px 0 rgba(181, 60, 255, 0.15);
        }

        .card-title { 
            font-family: 'Outfit', sans-serif;
            font-size: 1.15rem; 
            font-weight: 600; 
            margin-bottom: 20px; 
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }
        
        .card-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* KPI Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stat-box {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 100%);
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        /* Sci-Fi Decorative Corner */
        .stat-box::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            border-top: 15px solid var(--card-border);
            border-left: 15px solid transparent;
        }

        .stat-value { 
            font-family: 'Outfit', sans-serif;
            font-size: 2rem; 
            font-weight: 800; 
            color: #fff; 
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
            margin-top: 5px;
        }
        .stat-label { 
            font-size: 0.85rem; 
            color: var(--text-secondary); 
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .stat-blue { color: var(--neon-blue); text-shadow: 0 0 15px rgba(0, 240, 255, 0.4); }
        .stat-green { color: var(--neon-green); text-shadow: 0 0 15px rgba(57, 255, 20, 0.4); }
        .stat-purple { color: var(--neon-purple); text-shadow: 0 0 15px rgba(181, 60, 255, 0.4); }

        /* Cyberpunk Toggle Switch */
        .switch-container { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            background: rgba(0,0,0,0.3);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .switch { position: relative; display: inline-block; width: 60px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        
        .slider { 
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
            background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 34px; 
            border: 1px solid rgba(255,255,255,0.2);
        }
        .slider:before { 
            position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px; 
            background-color: var(--text-secondary); transition: .4s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        
        input:checked + .slider { 
            background-color: rgba(0, 240, 255, 0.15); 
            border-color: var(--neon-blue);
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.2);
        }
        input:checked + .slider:before { 
            transform: translateX(30px); 
            background-color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
        }
        
        .status-text { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            width: 80px;
        }
        
        .active-dot {
            width: 8px;
            height: 8px;
            background-color: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green);
            animation: pulse 1.5s infinite alternate;
        }

        .inactive-dot {
            width: 8px;
            height: 8px;
            background-color: var(--danger);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--danger);
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .chart-container {
            width: 100%;
            height: 350px;
            flex-grow: 1;
        }

    </style>
</head>
<body>
    <div class="header glass">
        <div>
            <h1>暖通空调智能控制系统 <span class="header-subtext">| 基于数据驱动与多目标优化</span></h1>
            <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 5px;">
                <span style="color: var(--neon-blue); border: 1px solid var(--neon-blue); padding: 2px 6px; border-radius: 4px; margin-right: 8px;">数据基座</span>本系统模拟数据流来自于公开建筑能耗开源数据集 (Building Data Genome Project 2)，非物理硬连线真实传感器。
            </div>
        </div>
        <div class="switch-container">
            <span class="status-text">AI 优化闭环控制</span>
            <label class="switch">
                <input type="checkbox" id="aiToggle" checked onchange="handleToggle(this.checked)">
                <span class="slider"></span>
            </label>
            <div class="status-indicator">
                <div id="aiDot" class="active-dot"></div>
                <span id="aiStatus" style="color: var(--neon-green);">运行中</span>
            </div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box glass">
            <div class="stat-label">室内平均温度</div>
            <div class="stat-value" id="val-temp">--.- <span style="font-size: 1rem; color: var(--text-secondary);">℃</span></div>
        </div>
        <div class="stat-box glass">
            <div class="stat-label">室内相对湿度</div>
            <div class="stat-value stat-blue" id="val-hum">--.- <span style="font-size: 1rem; color: var(--text-secondary);">%</span></div>
        </div>
        <div class="stat-box glass">
            <div class="stat-label">系统当前冷负荷</div>
            <div class="stat-value stat-purple" id="val-power">---.- <span style="font-size: 1rem; color: var(--text-secondary);">kW</span></div>
        </div>
        <div class="stat-box glass">
            <div class="stat-label">系统累计节能率</div>
            <div class="stat-value stat-green" id="val-saving">18.5 <span style="font-size: 1rem; color: var(--text-secondary);">%</span></div>
        </div>
    </div>

    <div class="dashboard">
        <div class="card glass c-span-8">
            <div class="card-title">多维环境参数实时监测</div>
            <div id="envChart" class="chart-container" style="height: 400px;"></div>
        </div>
        <div class="card glass c-span-4">
            <div class="card-title">控制指令下发状态 (决策变量)</div>
            <div id="controlChart" class="chart-container" style="height: 400px;"></div>
        </div>
        
        <div class="card glass c-span-4">
            <div class="card-title">系统实时能耗分布</div>
            <div id="energyChart" class="chart-container"></div>
        </div>
        <div class="card glass c-span-4">
            <div class="card-title">MOPSO 多目标帕累托前沿</div>
            <div id="mopsoChart" class="chart-container"></div>
        </div>
        <div class="card glass c-span-4">
            <div class="card-title">GAT-LSTM 负荷预测序列 (未来 12h)</div>
            <div id="predictChart" class="chart-container"></div>
        </div>
    </div>

    <script>
        let token = "";
        let headers = { 'Content-Type': 'application/json' };

        // Global Charts setup
        const envChart = echarts.init(document.getElementById('envChart'));
        const energyChart = echarts.init(document.getElementById('energyChart'));
        const predictChart = echarts.init(document.getElementById('predictChart'));
        const controlChart = echarts.init(document.getElementById('controlChart'));
        const mopsoChart = echarts.init(document.getElementById('mopsoChart'));

        // Common Axis Layout
        const axisStyle = {
            axisLine: { lineStyle: { color: 'rgba(255,255,255,0.2)' } },
            splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)', type: 'dashed' } },
            axisLabel: { color: '#94a3b8', fontFamily: 'Inter' }
        };

        const tooltipStyle = {
            backgroundColor: 'rgba(15, 20, 40, 0.8)',
            borderColor: 'rgba(0, 240, 255, 0.3)',
            borderWidth: 1,
            textStyle: { color: '#fff' },
            backdropFilter: 'blur(10px)'
        };

        async function loginAndInitialize() {
            const formData = new URLSearchParams();
            formData.append('username', 'admin');
            formData.append('password', 'admin123');
            
            try {
                const loginRes = await fetch('/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const loginData = await loginRes.json();
                token = loginData.access_token;
                headers['Authorization'] = `Bearer ${token}`;
                
                startPolling();
            } catch (error) {
                console.error("Auth failed", error);
            }
        }

        function startPolling() {
            fetchData();
            setInterval(fetchData, 4000);
            
            // Resize charts on window resize
            window.addEventListener('resize', function() {
                envChart.resize();
                energyChart.resize();
                predictChart.resize();
                controlChart.resize();
                mopsoChart.resize();
            });
        }

        async function handleToggle(checked) {
            try {
                const res = await fetch(`/api/v1/toggle_ai?mode=${checked}`, {
                    method: 'POST',
                    headers: headers
                });
                const data = await res.json();
                updateStatusUI(data.ai_mode);
            } catch (err) { console.error(err); }
        }

        function updateStatusUI(isAiEnabled) {
            const statusEl = document.getElementById('aiStatus');
            const dotEl = document.getElementById('aiDot');
            document.getElementById('aiToggle').checked = isAiEnabled;
            
            statusEl.innerText = isAiEnabled ? "运行中" : "已挂起";
            statusEl.style.color = isAiEnabled ? "var(--neon-green)" : "var(--text-secondary)";
            
            dotEl.className = isAiEnabled ? "active-dot" : "inactive-dot";
        }

        async function fetchData() {
            try {
                const [monRes, predRes, optRes] = await Promise.all([
                    fetch('/api/v1/monitoring', { headers }),
                    fetch('/api/v1/predict', { method: 'POST', headers }),
                    fetch('/api/v1/optimize', { method: 'POST', headers })
                ]);
                
                const data = await monRes.json();
                const predData = await predRes.json();
                const optData = await optRes.json();

                if (data && data.system) {
                    updateStatusUI(data.system.ai_mode);
                }
                
                if (data && data.history && data.history.length > 0) {
                    updateStats(data.history[data.history.length-1]);
                    updateCharts(data.history, predData, optData);
                }
            } catch (err) { console.error(err); }
        }

        function updateStats(last) {
            if(!last) return;
            document.getElementById('val-temp').innerHTML = last.temperature.toFixed(1) + ' <span style="font-size: 1rem; color: var(--text-secondary);">℃</span>';
            document.getElementById('val-hum').innerHTML = last.humidity.toFixed(1) + ' <span style="font-size: 1rem; color: var(--text-secondary);">%</span>';
            document.getElementById('val-power').innerHTML = last.power.toFixed(1) + ' <span style="font-size: 1rem; color: var(--text-secondary);">kW</span>';
        }

        function updateCharts(history, prediction, optimization) {
            const timeLabels = history.map(d => d.timestamp.split(' ')[1]);

            // 1. Env Chart (Area Gradients)
            envChart.setOption({
                tooltip: { ...tooltipStyle, trigger: 'axis' },
                legend: { data: ['室内温度(℃)', '室内湿度(%)', 'CO2(ppm)'], textStyle: { color: '#fff' }, top: 0 },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'category', boundaryGap: false, data: timeLabels, ...axisStyle },
                yAxis: [
                    { type: 'value', name: '℃ / %', nameTextStyle: {color: '#94a3b8'}, ...axisStyle }, 
                    { type: 'value', name: 'ppm', position: 'right', nameTextStyle: {color: '#94a3b8'}, ...axisStyle }
                ],
                series: [
                    { 
                        name: '室内温度(℃)', type: 'line', smooth: true, 
                        lineStyle: { width: 3, color: '#00f0ff', shadowColor: 'rgba(0, 240, 255, 0.5)', shadowBlur: 10 },
                        itemStyle: { color: '#00f0ff' },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(0, 240, 255, 0.4)' },
                                { offset: 1, color: 'rgba(0, 240, 255, 0)' }
                            ])
                        },
                        data: history.map(d => d.temperature) 
                    },
                    { 
                        name: '室内湿度(%)', type: 'line', smooth: true,
                        lineStyle: { width: 3, color: '#39ff14', shadowColor: 'rgba(57, 255, 20, 0.5)', shadowBlur: 10 },
                        itemStyle: { color: '#39ff14' },
                        data: history.map(d => d.humidity) 
                    },
                    { 
                        name: 'CO2(ppm)', type: 'line', yAxisIndex: 1, smooth: true,
                        lineStyle: { width: 2, color: 'rgba(255,255,255,0.4)', type: 'dashed' },
                        itemStyle: { color: '#ffffff' },
                        data: history.map(d => d.co2) 
                    }
                ]
            });

            // 2. Energy Chart (Bar with gradient)
            energyChart.setOption({
                tooltip: { ...tooltipStyle, trigger: 'axis' },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'category', data: timeLabels, ...axisStyle },
                yAxis: { type: 'value', ...axisStyle },
                series: [{ 
                    name: '系统当前冷负荷', type: 'bar', 
                    itemStyle: { 
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#b53cff' },
                            { offset: 1, color: 'rgba(181, 60, 255, 0.1)' }
                        ]),
                        borderRadius: [4, 4, 0, 0]
                    },
                    data: history.map(d => d.power) 
                }]
            });

            // 3. Predict Chart
            predictChart.setOption({
                tooltip: { ...tooltipStyle, trigger: 'axis' },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'category', data: prediction.forecast_horizon, ...axisStyle, boundaryGap: false },
                yAxis: { type: 'value', ...axisStyle },
                series: [{ 
                    name: '预测负荷', type: 'line', smooth: true,
                    lineStyle: { type: 'dashed', width: 3, color: '#ffb300' },
                    itemStyle: { color: '#ffb300' },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(255, 179, 0, 0.3)' },
                            { offset: 1, color: 'rgba(255, 179, 0, 0)' }
                        ])
                    },
                    data: prediction.predicted_load 
                }]
            });

            // 4. MOPSO Chart (Scatter with modern feel)
            mopsoChart.setOption({
                tooltip: { ...tooltipStyle, formatter: '能耗预测: {c0}kW<br/>PMV偏离度: {c1}' },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { name: '预测能耗 (kW)', nameTextStyle: {color: '#94a3b8'}, ...axisStyle },
                yAxis: { name: 'PMV 惩罚项', nameTextStyle: {color: '#94a3b8'}, ...axisStyle },
                series: [{
                    type: 'scatter',
                    symbolSize: 8,
                    data: Array.from({length: 30}, () => [Math.random()*60+80, Math.random()*20]),
                    itemStyle: { 
                        color: '#00f0ff',
                        shadowBlur: 10,
                        shadowColor: 'rgba(0, 240, 255, 0.5)'
                    }
                }]
            });

            // 5. Control Gauge (Cyberpunk styling)
            const isAi = optimization.mode && optimization.mode.includes("AI");
            controlChart.setOption({
                series: [{
                    type: 'gauge',
                    min: 16, max: 30,
                    splitNumber: 7,
                    axisLine: {
                        lineStyle: {
                            width: 15,
                            color: [
                                [0.3, '#00f0ff'],  // Cold
                                [0.7, '#39ff14'],  // Comfort
                                [1, '#ff003c']     // Hot
                            ]
                        }
                    },
                    pointer: { itemStyle: { color: 'auto' } },
                    axisTick: { distance: -15, length: 8, lineStyle: { color: '#fff', width: 2 } },
                    splitLine: { distance: -15, length: 30, lineStyle: { color: '#fff', width: 3 } },
                    axisLabel: { color: 'inherit', distance: 30, fontSize: 14, fontFamily: 'Outfit' },
                    detail: {
                        valueAnimation: true,
                        formatter: '{value} ℃\n{name}',
                        color: 'inherit',
                        fontSize: 28,
                        fontFamily: 'Outfit',
                        offsetCenter: [0, '60%'],
                        rich: {
                            name: {
                                fontSize: 14,
                                color: '#94a3b8',
                                padding: [10, 0, 0, 0]
                            }
                        }
                    },
                    data: [{ 
                        value: optimization.supply_air_setpoint || 24.0, 
                        name: isAi ? 'MOPSO 寻优设定值' : '系统基准运行值' 
                    }]
                }]
            });
        }

        // Run instantly
        loginAndInitialize();
    </script>
</body>
</html>
